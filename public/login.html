<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Вхід — Node-RED MQTT</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d1117;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e6edf3;
    }

    .bg-grid {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(240,100,0,.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(240,100,0,.06) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    .card {
      position: relative; z-index: 1;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 16px 48px rgba(0,0,0,.5);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }
    .logo-icon {
      width: 42px; height: 42px;
      background: linear-gradient(135deg, #f06000, #e03030);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 900; font-size: 18px; color: #fff; letter-spacing: -1px;
    }
    .logo h1 { font-size: 20px; font-weight: 600; }
    .logo span { color: #8b949e; font-size: 13px; display: block; }

    h2 { font-size: 22px; font-weight: 600; margin-bottom: 6px; }
    .subtitle { color: #8b949e; font-size: 14px; margin-bottom: 28px; }

    .form-group { margin-bottom: 18px; }
    label { display: block; font-size: 13px; color: #8b949e; margin-bottom: 6px; }

    input {
      width: 100%;
      padding: 10px 14px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 7px;
      color: #e6edf3;
      font-size: 14px;
      outline: none;
      transition: border-color .2s;
    }
    input:focus { border-color: #f06000; }

    .btn {
      width: 100%;
      padding: 11px;
      background: linear-gradient(135deg, #f06000, #e03030);
      border: none;
      border-radius: 7px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity .2s, transform .1s;
    }
    .btn:hover { opacity: .9; }
    .btn:active { transform: scale(.98); }
    .btn:disabled { opacity: .5; cursor: not-allowed; }

    .error-box {
      display: none;
      background: rgba(248,81,73,.1);
      border: 1px solid rgba(248,81,73,.4);
      border-radius: 7px;
      padding: 10px 14px;
      font-size: 13px;
      color: #f85149;
      margin-bottom: 16px;
    }

    .footer-link {
      text-align: center;
      margin-top: 22px;
      font-size: 13px;
      color: #8b949e;
    }
    .footer-link a {
      color: #f06000;
      text-decoration: none;
      font-weight: 500;
    }
    .footer-link a:hover { text-decoration: underline; }

    .divider {
      display: flex; align-items: center; gap: 10px;
      margin: 20px 0;
      color: #30363d; font-size: 12px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: #30363d;
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">NR</div>
      <div>
        <h1>Node-RED</h1>
        <span>MQTT Platform</span>
      </div>
    </div>

    <h2>Вхід до системи</h2>
    <p class="subtitle">Введіть ваші облікові дані</p>

    <div class="error-box" id="errorBox"></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="username">Ім'я користувача</label>
        <input type="text" id="username" name="username"
               placeholder="username" autocomplete="username" required />
      </div>
      <div class="form-group">
        <label for="password">Пароль</label>
        <input type="password" id="password" name="password"
               placeholder="••••••••" autocomplete="current-password" required />
      </div>
      <button type="submit" class="btn" id="submitBtn">Увійти</button>
    </form>

    <div class="divider">або</div>

    <div class="footer-link">
      Немає акаунту? <a href="/register">Зареєструватися</a>
    </div>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const errorBox = document.getElementById('errorBox');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorBox.style.display = 'none';
      submitBtn.disabled = true;
      submitBtn.textContent = 'Вхід...';

      const body = {
        username: document.getElementById('username').value.trim(),
        password: document.getElementById('password').value
      };

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        const data = await res.json();

        if (data.error) {
          errorBox.textContent = data.error;
          errorBox.style.display = 'block';
          submitBtn.disabled = false;
          submitBtn.textContent = 'Увійти';
        } else {
          submitBtn.textContent = 'Успішно!';
          window.location.href = data.redirectTo || '/dashboard';
        }
      } catch {
        errorBox.textContent = 'Помилка зʼєднання з сервером';
        errorBox.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Увійти';
      }
    });
  </script>
</body>
</html>
