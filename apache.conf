# Apache Virtual Host для Node-RED + MQTT за Cloudflare Zero Trust
# Скопіюйте: /etc/apache2/sites-available/mqtttest.conf
#
# Потрібні модулі:
#   sudo a2enmod proxy proxy_http proxy_wstunnel rewrite headers
#
# Архітектура:
#   User Browser (HTTPS)
#     → Cloudflare Edge
#       → cloudflared (тунель на RPi)
#         → Apache :80  ← цей конфіг
#           → Node.js :3000

<VirtualHost *:80>
    # Apache слухає на 80, але Cloudflare вже дав HTTPS юзеру.
    # Хост вказувати не потрібно — cloudflared підключається напряму.
    ServerName localhost

    ProxyPreserveHost On
    ProxyRequests Off

    # ── Пробрасовуємо заголовки від Cloudflare до Node.js ───────────────────
    # Не перезаписуємо X-Forwarded-Proto — Cloudflare вже виставив "https"
    RequestHeader unset X-Forwarded-Proto
    # Передаємо реальний IP клієнта з Cloudflare-специфічного заголовку
    RequestHeader set X-Real-IP "%{CF-Connecting-IP}e" env=CF-Connecting-IP

    # ── WebSocket: Node-RED editor live updates ──────────────────────────────
    # Явний ws-проксі стабільніший за RewriteCond для заголовка Connection,
    # який часто приходить як "keep-alive, Upgrade".
    ProxyPass        /editor/comms ws://127.0.0.1:3000/editor/comms retry=0
    ProxyPassReverse /editor/comms ws://127.0.0.1:3000/editor/comms

    # ── WebSocket: MQTT через браузер (wss:// від юзера → ws:// локально) ───
    ProxyPass        /mqtt ws://127.0.0.1:3000/mqtt retry=0
    ProxyPassReverse /mqtt ws://127.0.0.1:3000/mqtt

    # ── Звичайний HTTP → Node.js ─────────────────────────────────────────────
    ProxyPass        / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/

    ErrorLog  ${APACHE_LOG_DIR}/mqtttest-error.log
    CustomLog ${APACHE_LOG_DIR}/mqtttest-access.log combined
</VirtualHost>
